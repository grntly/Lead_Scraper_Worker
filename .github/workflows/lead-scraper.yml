name: Lead Scraper Worker

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Grantly Lead Scraper run ID"
        required: true
      source_id:
        description: "Grantly Lead Scraper source ID"
        required: true
      source_name:
        description: "Source name"
        required: false
      list_url:
        description: "Public list URL to fetch"
        required: true
      base_url:
        description: "Base URL for relative links"
        required: false
      config_json:
        description: "Selector/config JSON"
        required: false
      criteria_json:
        description: "Criteria JSON"
        required: false
      callback_url:
        description: "Grantly callback URL"
        required: true
      callback_token:
        description: "Callback bearer token"
        required: true
      max_pages:
        description: "Maximum pages to inspect"
        required: false
      timeout_seconds:
        description: "HTTP timeout in seconds"
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate worker
        run: node --check .github/scripts/run-dispatch.mjs && node --check src/lead_scrape.mjs

      - name: Run lead scraper
        env:
          RUN_ID: ${{ github.event.inputs.run_id }}
          SOURCE_ID: ${{ github.event.inputs.source_id }}
          SOURCE_NAME: ${{ github.event.inputs.source_name }}
          LIST_URL: ${{ github.event.inputs.list_url }}
          BASE_URL: ${{ github.event.inputs.base_url }}
          CONFIG_JSON: ${{ github.event.inputs.config_json }}
          CRITERIA_JSON: ${{ github.event.inputs.criteria_json }}
          CALLBACK_URL: ${{ github.event.inputs.callback_url }}
          CALLBACK_TOKEN: ${{ github.event.inputs.callback_token }}
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
          TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds }}
        run: node .github/scripts/run-dispatch.mjs
